{% extends "users/base_generic.html" %}

{% block content %}
<div class="container py-5">
    <h1 class="text-center mb-5">Movies</h1>

    <div class="row justify-content-center mb-5">
        <div class="col-md-8">
            <form method="GET" action="{% url 'movie_list' %}" class="search-bar">
                <div class="input-group">
                    <input
                        class="form-control form-control-lg"
                        name="search"
                        placeholder="Search for Movies..."
                        type="text"
                        value="{{ request.GET.search|default_if_none:'' }}"
                    />
                    <div class="input-group-append">
                        <button class="btn btn-primary" type="submit">Search</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="row">
        {% for movie in movies %}
        <div class="col-md-4 mb-4">
            <div class="card h-100">
                <img src="{{ movie.image.url }}" class="card-img-top" alt="{{ movie.name }}">
                <div class="card-body">
                    <h5 class="card-title">{{ movie.name }}</h5>
                    <a href="{% url 'theater_list' movie.id %}" class="btn btn-outline-primary">View Theaters</a>
                </div>
            </div>
        </div>
        {% empty %}
        <div class="col-12 text-center">
            <p>No movies found.</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
